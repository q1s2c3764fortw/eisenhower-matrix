<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艾森豪爾任務矩陣</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-primary-highlight:#cedcd8;
  --color-warning:#964219;--color-warning-highlight:#ddcfc6;
  --color-error:#a12c7b;--color-error-highlight:#e0ced7;
  --color-success:#437a22;--color-success-highlight:#d4dfcc;
  --color-gold:#d19900;--color-gold-highlight:#e9e0c6;
  --color-orange:#da7101;--color-orange-highlight:#e7d7c4;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --font-body:'Noto Sans TC','Inter',sans-serif;
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-highlight:#313b3b;
  --color-warning:#bb653b;--color-warning-highlight:#564942;
  --color-error:#d163a7;--color-error-highlight:#4c3d46;
  --color-success:#6daa45;--color-success-highlight:#3a4435;
  --color-gold:#e8af34;--color-gold-highlight:#4d4332;
  --color-orange:#fdab43;--color-orange-highlight:#564b3e;
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);
  --shadow-md:0 4px 12px oklch(0 0 0/.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/.4);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-highlight:#313b3b;
  --color-warning:#bb653b;--color-warning-highlight:#564942;
  --color-error:#d163a7;--color-error-highlight:#4c3d46;
  --color-success:#6daa45;--color-success-highlight:#3a4435;
  --color-gold:#e8af34;--color-gold-highlight:#4d4332;
  --color-orange:#fdab43;--color-orange-highlight:#564b3e;
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);
  --shadow-md:0 4px 12px oklch(0 0 0/.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/.4);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text);background:var(--color-bg);display:flex;flex-direction:column}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;transition:color var(--transition-interactive),background var(--transition-interactive),box-shadow var(--transition-interactive)}
input,textarea{font:inherit;color:inherit}
/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-6);background:var(--color-surface);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:100}
.app-logo{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-base);font-weight:700;color:var(--color-text)}
.app-logo svg{color:var(--color-primary)}
.header-actions{display:flex;align-items:center;gap:var(--space-2)}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--color-text-muted);transition:background var(--transition-interactive),color var(--transition-interactive)}
.btn-icon:hover{background:var(--color-surface-dynamic);color:var(--color-text)}
/* ADD TASK */
.add-task-bar{padding:var(--space-4) var(--space-6);background:var(--color-surface);border-bottom:1px solid var(--color-border);display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap}
.task-input{flex:1;min-width:200px;padding:var(--space-2) var(--space-4);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg);font-size:var(--text-sm);color:var(--color-text);outline:none;transition:border-color var(--transition-interactive),box-shadow var(--transition-interactive)}
.task-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h/.15)}
.btn-primary{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);background:var(--color-primary);color:#fff;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;transition:background var(--transition-interactive)}
.btn-primary:hover{background:var(--color-primary-hover)}
/* MATRIX */
.matrix-wrapper{flex:1;padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-4)}
.matrix-labels-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);padding-inline:0}
.axis-label{text-align:center;font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted)}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:var(--space-4);flex:1;min-height:0}
/* QUADRANT */
.quadrant{background:var(--color-surface);border-radius:var(--radius-lg);border:1px solid var(--color-border);padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);min-height:240px;transition:box-shadow var(--transition-interactive),border-color var(--transition-interactive)}
.quadrant.drag-over{border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h/.18),var(--shadow-md)}
.q-header{display:flex;align-items:center;gap:var(--space-2)}
.q-dot{width:10px;height:10px;border-radius:var(--radius-full);flex-shrink:0}
.q1 .q-dot{background:var(--color-error)}
.q2 .q-dot{background:var(--color-primary)}
.q3 .q-dot{background:var(--color-orange)}
.q4 .q-dot{background:var(--color-text-faint)}
.q-title{font-size:var(--text-sm);font-weight:700;color:var(--color-text)}
.q-subtitle{font-size:var(--text-xs);color:var(--color-text-muted);margin-left:auto}
.q-cards{display:flex;flex-direction:column;gap:var(--space-2);flex:1}
.q-empty{display:flex;align-items:center;justify-content:center;flex:1;color:var(--color-text-faint);font-size:var(--text-xs);border:1.5px dashed var(--color-border);border-radius:var(--radius-md);min-height:64px}
/* TASK CARD */
.task-card{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3);display:flex;align-items:flex-start;gap:var(--space-2);cursor:grab;user-select:none;transition:box-shadow var(--transition-interactive),opacity var(--transition-interactive),transform var(--transition-interactive)}
.task-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.task-card:active{cursor:grabbing;box-shadow:var(--shadow-lg);transform:translateY(-2px) scale(1.01)}
.task-card.dragging{opacity:.45;transform:scale(0.97)}
.task-card.completed{opacity:.5}
.task-card.completed .task-text{text-decoration:line-through;color:var(--color-text-muted)}
/* CHECKBOX */
.task-check{width:18px;height:18px;flex-shrink:0;border:2px solid var(--color-border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background var(--transition-interactive),border-color var(--transition-interactive);margin-top:1px}
.task-check:hover{border-color:var(--color-primary)}
.task-check.checked{background:var(--color-primary);border-color:var(--color-primary)}
.task-check.checked svg{display:block}
.task-check svg{display:none;width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none}
/* TASK BODY */
.task-body{flex:1;min-width:0}
.task-text{font-size:var(--text-sm);color:var(--color-text);line-height:1.4;word-break:break-word}
.task-meta{display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-1);flex-wrap:wrap}
.task-tag{font-size:10px;padding:1px 6px;border-radius:var(--radius-full);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.task-date{font-size:10px;color:var(--color-text-faint)}
/* TASK ACTIONS */
.task-actions{display:flex;flex-direction:column;gap:var(--space-1);opacity:0;transition:opacity var(--transition-interactive)}
.task-card:hover .task-actions{opacity:1}
.task-action-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--color-text-faint);transition:background var(--transition-interactive),color var(--transition-interactive)}
.task-action-btn:hover{background:var(--color-surface-dynamic);color:var(--color-text)}
.task-action-btn.delete:hover{color:var(--color-error)}
/* UNDO BANNER */
.undo-banner{position:fixed;bottom:var(--space-6);left:50%;transform:translateX(-50%);background:var(--color-text);color:var(--color-bg);padding:var(--space-3) var(--space-6);border-radius:var(--radius-lg);font-size:var(--text-sm);display:flex;align-items:center;gap:var(--space-4);box-shadow:var(--shadow-lg);z-index:999;animation:slideUp .22s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.undo-btn{color:var(--color-primary);font-weight:700;cursor:pointer;padding:0 var(--space-1)}
.undo-banner.hiding{animation:slideDown .22s cubic-bezier(.16,1,.3,1) forwards}
@keyframes slideDown{from{transform:translateX(-50%) translateY(0);opacity:1}to{transform:translateX(-50%) translateY(20px);opacity:0}}
/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:oklch(.1 0 0/.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:var(--space-4)}
.modal{background:var(--color-surface);border-radius:var(--radius-xl);padding:var(--space-8);width:100%;max-width:480px;box-shadow:var(--shadow-lg);animation:modalIn .22s cubic-bezier(.16,1,.3,1)}
@keyframes modalIn{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-6)}
.form-row{display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-4)}
.form-label{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted)}
.form-input{padding:var(--space-3) var(--space-4);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg);font-size:var(--text-sm);color:var(--color-text);outline:none;width:100%;transition:border-color var(--transition-interactive),box-shadow var(--transition-interactive)}
.form-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h/.15)}
textarea.form-input{resize:vertical;min-height:72px}
.q-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)}
.q-option{padding:var(--space-3);border:2px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;font-size:var(--text-xs);font-weight:600;text-align:center;transition:border-color var(--transition-interactive),background var(--transition-interactive)}
.q-option:hover{background:var(--color-surface-dynamic)}
.q-option.selected.q1-opt{border-color:var(--color-error);background:var(--color-error-highlight)}
.q-option.selected.q2-opt{border-color:var(--color-primary);background:var(--color-primary-highlight)}
.q-option.selected.q3-opt{border-color:var(--color-orange);background:var(--color-orange-highlight)}
.q-option.selected.q4-opt{border-color:var(--color-text-faint);background:var(--color-surface-dynamic)}
.modal-actions{display:flex;gap:var(--space-3);justify-content:flex-end;margin-top:var(--space-6)}
.btn-ghost{padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted);transition:background var(--transition-interactive),color var(--transition-interactive)}
.btn-ghost:hover{background:var(--color-surface-dynamic);color:var(--color-text)}
/* AXIS ARROWS */
.matrix-axis-y{writing-mode:vertical-lr;transform:rotate(180deg);font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-faint);display:flex;align-items:center;gap:var(--space-2);padding:var(--space-4) 0}
.matrix-with-axis{display:flex;gap:var(--space-2);flex:1;min-height:0}
.matrix-content{flex:1;display:flex;flex-direction:column;gap:var(--space-2)}
.axis-x-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);text-align:center}
/* COMPLETED SECTION */
.completed-section{padding:0 var(--space-6) var(--space-6)}
.completed-toggle{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted);cursor:pointer;padding:var(--space-2) 0;width:100%;text-align:left}
.completed-toggle:hover{color:var(--color-text)}
.completed-toggle svg{transition:transform .2s}
.completed-toggle.open svg{transform:rotate(90deg)}
.completed-list{display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-3)}
/* TAG COLORS */
.tag-q1{background:var(--color-error-highlight);color:var(--color-error)}
.tag-q2{background:var(--color-primary-highlight);color:var(--color-primary)}
.tag-q3{background:var(--color-orange-highlight);color:var(--color-orange)}
.tag-q4{background:var(--color-surface-dynamic);color:var(--color-text-faint)}
@media(max-width:680px){
  .matrix-grid{grid-template-columns:1fr;grid-template-rows:unset}
  .matrix-labels-row{grid-template-columns:1fr}
  .matrix-labels-row .axis-label:last-child{display:none}
  .add-task-bar{padding:var(--space-3) var(--space-4)}
  .matrix-wrapper{padding:var(--space-4)}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="矩陣圖示">
      <rect x="2" y="2" width="9" height="9" rx="1.5"/><rect x="13" y="2" width="9" height="9" rx="1.5"/>
      <rect x="2" y="13" width="9" height="9" rx="1.5"/><rect x="13" y="13" width="9" height="9" rx="1.5"/>
    </svg>
    艾森豪爾矩陣
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="completed-btn" title="已完成任務" aria-label="顯示已完成任務">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    </button>
    <button class="btn-icon" data-theme-toggle aria-label="切換深色模式">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</header>

<div class="add-task-bar">
  <input class="task-input" id="quick-input" type="text" placeholder="輸入新任務…按 Enter 快速加入暫存區，或點選「＋加入任務」選擇象限">
  <button class="btn-primary" id="add-task-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    加入任務
  </button>
</div>

<div class="matrix-wrapper">
  <div class="matrix-with-axis">
    <div class="matrix-axis-y" aria-hidden="true">
      <span>↑ 緊急</span>
    </div>
    <div class="matrix-content">
      <div class="axis-x-row" aria-hidden="true">
        <span class="axis-label">重要</span>
        <span class="axis-label">不重要</span>
      </div>
      <div class="matrix-grid" id="matrix">
        <!-- Q1 -->
        <div class="quadrant q1" data-quadrant="q1" id="drop-q1">
          <div class="q-header">
            <span class="q-dot"></span>
            <span class="q-title">立即執行</span>
            <span class="q-subtitle">緊急 × 重要</span>
          </div>
          <div class="q-cards" id="cards-q1"></div>
        </div>
        <!-- Q2 -->
        <div class="quadrant q2" data-quadrant="q2" id="drop-q2">
          <div class="q-header">
            <span class="q-dot"></span>
            <span class="q-title">規劃執行</span>
            <span class="q-subtitle">不緊急 × 重要</span>
          </div>
          <div class="q-cards" id="cards-q2"></div>
        </div>
        <!-- Q3 -->
        <div class="quadrant q3" data-quadrant="q3" id="drop-q3">
          <div class="q-header">
            <span class="q-dot"></span>
            <span class="q-title">委派他人</span>
            <span class="q-subtitle">緊急 × 不重要</span>
          </div>
          <div class="q-cards" id="cards-q3"></div>
        </div>
        <!-- Q4 -->
        <div class="quadrant q4" data-quadrant="q4" id="drop-q4">
          <div class="q-header">
            <span class="q-dot"></span>
            <span class="q-title">刪除或延後</span>
            <span class="q-subtitle">不緊急 × 不重要</span>
          </div>
          <div class="q-cards" id="cards-q4"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Completed Section -->
<div class="completed-section" id="completed-section" style="display:none">
  <button class="completed-toggle" id="completed-toggle">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    已完成任務
    <span id="completed-count" style="color:var(--color-text-faint);font-size:var(--text-xs)"></span>
  </button>
  <div class="completed-list" id="completed-list" style="display:none"></div>
</div>

<!-- Add Task Modal -->
<div class="modal-backdrop" id="modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <h2 class="modal-title" id="modal-title">新增任務</h2>
    <div class="form-row">
      <label class="form-label" for="modal-title-input">任務名稱</label>
      <input class="form-input" id="modal-title-input" type="text" placeholder="輸入任務名稱…">
    </div>
    <div class="form-row">
      <label class="form-label" for="modal-note">備註（選填）</label>
      <textarea class="form-input" id="modal-note" placeholder="備註說明…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-label">放入象限</div>
      <div class="q-select-grid">
        <div class="q-option q1-opt" data-q="q1">🔴 立即執行<br><small>緊急 × 重要</small></div>
        <div class="q-option q2-opt" data-q="q2">🟢 規劃執行<br><small>不緊急 × 重要</small></div>
        <div class="q-option q3-opt" data-q="q3">🟠 委派他人<br><small>緊急 × 不重要</small></div>
        <div class="q-option q4-opt" data-q="q4">⚪ 刪除或延後<br><small>不緊急 × 不重要</small></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">取消</button>
      <button class="btn-primary" id="modal-confirm">加入</button>
    </div>
  </div>
</div>

<!-- Undo Banner -->
<div class="undo-banner" id="undo-banner" style="display:none" role="status">
  <span id="undo-msg">已完成任務</span>
  <button class="undo-btn" id="undo-action">復原</button>
</div>

<script>
(function(){
// ——————— STATE ———————
let tasks = [];
let completedTasks = [];
let nextId = 1;
let dragId = null;
let undoStack = []; // {type, task, quadrant}
let undoTimer = null;

const LABELS = {q1:'立即執行',q2:'規劃執行',q3:'委派他人',q4:'刪除或延後'};

function loadFromStorage(){
  try{
    const d = JSON.parse(localStorage.getItem('eisenhower_v2')||'null');
    if(d){tasks=d.tasks||[];completedTasks=d.completed||[];nextId=d.nextId||1;}
  }catch(e){}
}
function saveToStorage(){
  try{localStorage.setItem('eisenhower_v2',JSON.stringify({tasks,completed:completedTasks,nextId}));}catch(e){}
}

loadFromStorage();

// ——————— RENDER ———————
function render(){
  ['q1','q2','q3','q4'].forEach(q=>{
    const el = document.getElementById('cards-'+q);
    const qTasks = tasks.filter(t=>t.quadrant===q);
    if(qTasks.length===0){
      el.innerHTML='<div class="q-empty">拖曳任務至此</div>';
    }else{
      el.innerHTML='';
      qTasks.forEach(t=>el.appendChild(createCard(t)));
    }
  });
  renderCompleted();
  saveToStorage();
}

function createCard(task){
  const div = document.createElement('div');
  div.className='task-card'+(task.completed?' completed':'');
  div.draggable=true;
  div.dataset.id=task.id;
  div.innerHTML=`
    <button class="task-check${task.completed?' checked':''}" data-action="check" title="完成任務" aria-label="標記完成">
      <svg viewBox="0 0 12 12"><polyline points="1.5 6 4.5 9 10.5 3"/></svg>
    </button>
    <div class="task-body">
      <div class="task-text">${escHtml(task.title)}</div>
      ${task.note?`<div class="task-date">${escHtml(task.note)}</div>`:''}
      <div class="task-meta">
        <span class="task-tag tag-${task.quadrant}">${LABELS[task.quadrant]}</span>
        <span class="task-date">${task.created}</span>
      </div>
    </div>
    <div class="task-actions">
      <button class="task-action-btn delete" data-action="delete" title="刪除" aria-label="刪除任務">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend', onDragEnd);
  div.addEventListener('click', e=>{
    const btn = e.target.closest('[data-action]');
    if(!btn) return;
    if(btn.dataset.action==='check') completeTask(task.id);
    if(btn.dataset.action==='delete') deleteTask(task.id);
  });
  return div;
}

function renderCompleted(){
  const list = document.getElementById('completed-list');
  const section = document.getElementById('completed-section');
  const count = document.getElementById('completed-count');
  if(completedTasks.length===0){section.style.display='none';return;}
  section.style.display='';
  count.textContent='('+completedTasks.length+')';
  list.innerHTML='';
  completedTasks.slice().reverse().forEach(t=>{
    const div = createCompletedCard(t);
    list.appendChild(div);
  });
}

function createCompletedCard(task){
  const div=document.createElement('div');
  div.className='task-card completed';
  div.style.opacity='.55';
  div.innerHTML=`
    <button class="task-check checked" data-action="uncheck" title="標記為未完成" aria-label="取消完成">
      <svg viewBox="0 0 12 12"><polyline points="1.5 6 4.5 9 10.5 3"/></svg>
    </button>
    <div class="task-body">
      <div class="task-text">${escHtml(task.title)}</div>
      <div class="task-meta">
        <span class="task-tag tag-${task.quadrant}">${LABELS[task.quadrant]}</span>
        <span class="task-date">完成於 ${task.completedAt}</span>
      </div>
    </div>
    <div class="task-actions">
      <button class="task-action-btn delete" data-action="permdelete" title="永久刪除" aria-label="永久刪除">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  div.addEventListener('click',e=>{
    const btn=e.target.closest('[data-action]');
    if(!btn)return;
    if(btn.dataset.action==='uncheck') restoreTask(task.id);
    if(btn.dataset.action==='permdelete') permDeleteTask(task.id);
  });
  return div;
}

// ——————— ACTIONS ———————
function addTask(title, note, quadrant){
  if(!title.trim()||!quadrant)return;
  const now=new Date();
  const dateStr=now.getMonth()+1+'/'+(now.getDate())+' '+now.getHours()+':'+(now.getMinutes()+'').padStart(2,'0');
  tasks.push({id:nextId++,title:title.trim(),note:note||'',quadrant,created:dateStr,completed:false});
  render();
}

function completeTask(id){
  const idx=tasks.findIndex(t=>t.id===id);
  if(idx<0)return;
  const task=tasks.splice(idx,1)[0];
  const now=new Date();
  task.completedAt=now.getMonth()+1+'/'+(now.getDate())+' '+now.getHours()+':'+(now.getMinutes()+'').padStart(2,'0');
  completedTasks.push(task);
  render();
  showUndo('已完成：'+task.title,()=>{
    completedTasks.pop();
    task.completed=false;
    tasks.push(task);
    render();
  });
}

function deleteTask(id){
  const idx=tasks.findIndex(t=>t.id===id);
  if(idx<0)return;
  const task=tasks.splice(idx,1)[0];
  render();
  showUndo('已刪除：'+task.title,()=>{
    tasks.push(task);
    render();
  });
}

function restoreTask(id){
  const idx=completedTasks.findIndex(t=>t.id===id);
  if(idx<0)return;
  const task=completedTasks.splice(idx,1)[0];
  task.completed=false;
  delete task.completedAt;
  tasks.push(task);
  render();
}

function permDeleteTask(id){
  const idx=completedTasks.findIndex(t=>t.id===id);
  if(idx<0)return;
  completedTasks.splice(idx,1);
  render();
}

// ——————— DRAG & DROP ———————
function onDragStart(e){
  dragId=parseInt(this.dataset.id);
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',dragId);
}
function onDragEnd(){
  this.classList.remove('dragging');
  document.querySelectorAll('.quadrant').forEach(q=>q.classList.remove('drag-over'));
  dragId=null;
}

document.querySelectorAll('.quadrant').forEach(q=>{
  q.addEventListener('dragover',e=>{
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    q.classList.add('drag-over');
  });
  q.addEventListener('dragleave',()=>q.classList.remove('drag-over'));
  q.addEventListener('drop',e=>{
    e.preventDefault();
    q.classList.remove('drag-over');
    if(dragId==null)return;
    const newQ=q.dataset.quadrant;
    const task=tasks.find(t=>t.id===dragId);
    if(task&&task.quadrant!==newQ){
      task.quadrant=newQ;
      render();
    }
  });
});

// ——————— MODAL ———————
let selectedQ=null;
const modal=document.getElementById('modal');
const modalTitleInput=document.getElementById('modal-title-input');
const modalNote=document.getElementById('modal-note');

function openModal(prefill){
  modalTitleInput.value=prefill||'';
  modalNote.value='';
  selectedQ=null;
  document.querySelectorAll('.q-option').forEach(o=>o.classList.remove('selected'));
  modal.style.display='flex';
  setTimeout(()=>modalTitleInput.focus(),50);
}
function closeModal(){modal.style.display='none';}

document.querySelectorAll('.q-option').forEach(opt=>{
  opt.addEventListener('click',()=>{
    selectedQ=opt.dataset.q;
    document.querySelectorAll('.q-option').forEach(o=>o.classList.remove('selected'));
    opt.classList.add('selected');
  });
});

document.getElementById('add-task-btn').addEventListener('click',()=>{
  const v=document.getElementById('quick-input').value;
  openModal(v);
});
document.getElementById('quick-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const v=e.target.value.trim();
    if(v){openModal(v);}
  }
});

document.getElementById('modal-cancel').addEventListener('click',closeModal);
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.getElementById('modal-confirm').addEventListener('click',()=>{
  const t=modalTitleInput.value.trim();
  if(!t){modalTitleInput.focus();return;}
  if(!selectedQ){alert('請選擇象限');return;}
  addTask(t,modalNote.value,selectedQ);
  document.getElementById('quick-input').value='';
  closeModal();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&modal.style.display!=='none')closeModal();
});

// ——————— UNDO ———————
function showUndo(msg,fn){
  if(undoTimer)clearTimeout(undoTimer);
  const banner=document.getElementById('undo-banner');
  document.getElementById('undo-msg').textContent=msg;
  banner.classList.remove('hiding');
  banner.style.display='flex';
  const handler=()=>{
    fn();
    banner.style.display='none';
    clearTimeout(undoTimer);
  };
  const undoBtn=document.getElementById('undo-action');
  undoBtn.onclick=handler;
  undoTimer=setTimeout(()=>{
    banner.classList.add('hiding');
    setTimeout(()=>banner.style.display='none',230);
  },4000);
}

// ——————— COMPLETED TOGGLE ———————
const completedToggle=document.getElementById('completed-toggle');
const completedList=document.getElementById('completed-list');
document.getElementById('completed-btn').addEventListener('click',()=>{
  const section=document.getElementById('completed-section');
  if(section.style.display==='none'){
    section.style.display='';
    completedList.style.display='';
    completedToggle.classList.add('open');
  }else{
    section.style.display='none';
    completedList.style.display='none';
    completedToggle.classList.remove('open');
  }
});
completedToggle.addEventListener('click',()=>{
  const open=completedList.style.display!=='none';
  completedList.style.display=open?'none':'';
  completedToggle.classList.toggle('open',!open);
});

// ——————— THEME ———————
(function(){
  const t=document.querySelector('[data-theme-toggle]');
  const r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  try{const s=localStorage.getItem('ei_theme');if(s)d=s;}catch(e){}
  r.setAttribute('data-theme',d);
  const update=()=>{
    t.innerHTML=d==='dark'
      ?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      :'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    t.setAttribute('aria-label','切換'+(d==='dark'?'亮色':'深色')+'模式');
  };
  update();
  t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    try{localStorage.setItem('ei_theme',d);}catch(e){}
    update();
  });
})();

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

render();
})();
</script>
</body>
</html>
