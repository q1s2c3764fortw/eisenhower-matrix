<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艾森豪爾任務矩陣</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-highlight:#cedcd8;
  --color-warning:#964219;--color-warning-highlight:#ddcfc6;
  --color-error:#a12c7b;--color-error-highlight:#e0ced7;
  --color-success:#437a22;--color-success-highlight:#d4dfcc;
  --color-orange:#da7101;--color-orange-highlight:#e7d7c4;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);--shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);--shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --font-body:'Noto Sans TC','Inter',sans-serif;
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-6:1.5rem;--space-8:2rem;
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-highlight:#313b3b;
  --color-warning:#bb653b;--color-warning-highlight:#564942;
  --color-error:#d163a7;--color-error-highlight:#4c3d46;
  --color-success:#6daa45;--color-success-highlight:#3a4435;
  --color-orange:#fdab43;--color-orange-highlight:#564b3e;
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);--shadow-lg:0 12px 32px oklch(0 0 0/.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text);background:var(--color-bg);display:flex;flex-direction:column}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;transition:color var(--transition-interactive),background var(--transition-interactive)}
input,textarea,select{font:inherit;color:inherit}

.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:var(--space-6);padding:var(--space-8)}
.login-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-8);max-width:400px;width:100%;text-align:center;box-shadow:var(--shadow-md)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:var(--space-2);font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4);color:var(--color-primary)}
.login-desc{color:var(--color-text-muted);font-size:var(--text-sm);margin-bottom:var(--space-6);line-height:1.6}
.btn-google{display:flex;align-items:center;justify-content:center;gap:var(--space-3);width:100%;padding:var(--space-3) var(--space-6);border:1.5px solid var(--color-border);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;background:var(--color-bg);transition:background var(--transition-interactive),box-shadow var(--transition-interactive)}
.btn-google:hover{background:var(--color-surface-dynamic);box-shadow:var(--shadow-sm)}

.app-screen{display:none;flex-direction:column;flex:1}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-6);background:var(--color-surface);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:100}
.app-logo{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-base);font-weight:700}
.app-logo svg{color:var(--color-primary)}
.user-info{display:flex;align-items:center;gap:var(--space-3)}
.user-avatar{width:28px;height:28px;border-radius:var(--radius-full);object-fit:cover;border:1.5px solid var(--color-border)}
.user-name{font-size:var(--text-xs);color:var(--color-text-muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-actions{display:flex;align-items:center;gap:var(--space-2)}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--color-text-muted)}
.btn-icon:hover{background:var(--color-surface-dynamic);color:var(--color-text)}

.add-task-bar{padding:var(--space-4) var(--space-6);background:var(--color-surface);border-bottom:1px solid var(--color-border);display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap}
.task-input{flex:1;min-width:200px;padding:var(--space-2) var(--space-4);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg);font-size:var(--text-sm);outline:none;transition:border-color var(--transition-interactive),box-shadow var(--transition-interactive)}
.task-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h/.15)}
.btn-primary{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);background:var(--color-primary);color:#fff;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600}
.btn-primary:hover{background:var(--color-primary-hover)}

.matrix-wrapper{flex:1;padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-4)}
.matrix-with-axis{display:flex;gap:var(--space-2);flex:1;min-height:0}
.matrix-axis-y{writing-mode:vertical-lr;transform:rotate(180deg);font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-faint);display:flex;align-items:center;padding:var(--space-4) 0}
.matrix-content{flex:1;display:flex;flex-direction:column;gap:var(--space-2)}
.axis-x-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);text-align:center}
.axis-label{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted)}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:var(--space-4);flex:1;min-height:0}
.quadrant{background:var(--color-surface);border-radius:var(--radius-lg);border:1px solid var(--color-border);padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);min-height:240px;transition:box-shadow var(--transition-interactive),border-color var(--transition-interactive)}
.quadrant.drag-over{border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h/.18)}
.q-header{display:flex;align-items:center;gap:var(--space-2)}
.q-dot{width:10px;height:10px;border-radius:var(--radius-full);flex-shrink:0}
.q1 .q-dot{background:var(--color-error)}.q2 .q-dot{background:var(--color-primary)}
.q3 .q-dot{background:var(--color-orange)}.q4 .q-dot{background:var(--color-text-faint)}
.q-title{font-size:var(--text-sm);font-weight:700}.q-subtitle{font-size:var(--text-xs);color:var(--color-text-muted);margin-left:auto}
.q-cards{display:flex;flex-direction:column;gap:var(--space-2);flex:1}
.q-empty{display:flex;align-items:center;justify-content:center;flex:1;color:var(--color-text-faint);font-size:var(--text-xs);border:1.5px dashed var(--color-border);border-radius:var(--radius-md);min-height:64px}

.task-card{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3);display:flex;align-items:flex-start;gap:var(--space-2);cursor:grab;user-select:none;transition:box-shadow var(--transition-interactive),transform var(--transition-interactive),opacity var(--transition-interactive)}
.task-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.task-card:active{cursor:grabbing}
.task-card.dragging{opacity:.4;transform:scale(.97)}
.task-card.completed .task-text{text-decoration:line-through;color:var(--color-text-muted)}
.task-check{width:18px;height:18px;flex-shrink:0;border:2px solid var(--color-border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background var(--transition-interactive),border-color var(--transition-interactive);margin-top:1px}
.task-check:hover{border-color:var(--color-primary)}
.task-check.checked{background:var(--color-primary);border-color:var(--color-primary)}
.task-check.checked svg{display:block}
.task-check svg{display:none;width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none}
.task-body{flex:1;min-width:0}
.task-text{font-size:var(--text-sm);line-height:1.4;word-break:break-word}
.task-meta{display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-1);flex-wrap:wrap}
.task-tag{font-size:10px;padding:1px 6px;border-radius:var(--radius-full);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.task-date{font-size:10px;color:var(--color-text-faint)}
/* repeat badge */
.repeat-badge{font-size:10px;padding:1px 6px;border-radius:var(--radius-full);font-weight:600;background:var(--color-primary-highlight);color:var(--color-primary);display:flex;align-items:center;gap:2px}
.task-actions{display:flex;flex-direction:column;gap:var(--space-1);opacity:0;transition:opacity var(--transition-interactive)}
.task-card:hover .task-actions{opacity:1}
.task-action-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--color-text-faint)}
.task-action-btn:hover{background:var(--color-surface-dynamic);color:var(--color-text)}
.task-action-btn.delete:hover{color:var(--color-error)}
.tag-q1{background:var(--color-error-highlight);color:var(--color-error)}
.tag-q2{background:var(--color-primary-highlight);color:var(--color-primary)}
.tag-q3{background:var(--color-orange-highlight);color:var(--color-orange)}
.tag-q4{background:var(--color-surface-dynamic);color:var(--color-text-faint)}

.undo-banner{position:fixed;bottom:var(--space-6);left:50%;transform:translateX(-50%);background:var(--color-text);color:var(--color-bg);padding:var(--space-3) var(--space-6);border-radius:var(--radius-lg);font-size:var(--text-sm);display:flex;align-items:center;gap:var(--space-4);box-shadow:var(--shadow-lg);z-index:999;animation:slideUp .22s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.undo-btn{color:var(--color-primary);font-weight:700;cursor:pointer}
.undo-banner.hiding{animation:slideDown .22s forwards}
@keyframes slideDown{from{transform:translateX(-50%) translateY(0);opacity:1}to{transform:translateX(-50%) translateY(20px);opacity:0}}

.modal-backdrop{position:fixed;inset:0;background:oklch(.1 0 0/.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:var(--space-4)}
.modal{background:var(--color-surface);border-radius:var(--radius-xl);padding:var(--space-8);width:100%;max-width:480px;box-shadow:var(--shadow-lg);animation:modalIn .22s cubic-bezier(.16,1,.3,1);max-height:90dvh;overflow-y:auto}
@keyframes modalIn{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-6)}
.form-row{display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-4)}
.form-label{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted)}
.form-input{padding:var(--space-3) var(--space-4);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg);font-size:var(--text-sm);outline:none;width:100%;transition:border-color var(--transition-interactive),box-shadow var(--transition-interactive)}
.form-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h/.15)}
textarea.form-input{resize:vertical;min-height:72px}
.q-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)}
.q-option{padding:var(--space-3);border:2px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;font-size:var(--text-xs);font-weight:600;text-align:center;transition:border-color var(--transition-interactive),background var(--transition-interactive)}
.q-option:hover{background:var(--color-surface-dynamic)}
.q-option.selected.q1-opt{border-color:var(--color-error);background:var(--color-error-highlight)}
.q-option.selected.q2-opt{border-color:var(--color-primary);background:var(--color-primary-highlight)}
.q-option.selected.q3-opt{border-color:var(--color-orange);background:var(--color-orange-highlight)}
.q-option.selected.q4-opt{border-color:var(--color-text-faint);background:var(--color-surface-dynamic)}
/* repeat select */
.repeat-select-row{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-2)}
.repeat-opt{padding:var(--space-2) var(--space-1);border:2px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;font-size:10px;font-weight:600;text-align:center;transition:border-color var(--transition-interactive),background var(--transition-interactive)}
.repeat-opt:hover{background:var(--color-surface-dynamic)}
.repeat-opt.selected{border-color:var(--color-primary);background:var(--color-primary-highlight)}
.modal-actions{display:flex;gap:var(--space-3);justify-content:flex-end;margin-top:var(--space-6)}
.btn-ghost{padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted)}
.btn-ghost:hover{background:var(--color-surface-dynamic);color:var(--color-text)}

.completed-section{padding:0 var(--space-6) var(--space-6)}
.completed-toggle{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted);cursor:pointer;padding:var(--space-2) 0;width:100%}
.completed-toggle:hover{color:var(--color-text)}
.completed-toggle svg{transition:transform .2s}
.completed-toggle.open svg{transform:rotate(90deg)}
.completed-list{display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-3)}

.sync-dot{width:6px;height:6px;border-radius:var(--radius-full);background:var(--color-success);display:inline-block;margin-right:4px}
.sync-dot.syncing{background:var(--color-gold,#d19900);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100dvh;font-size:var(--text-sm);color:var(--color-text-muted)}

/* repeat templates section */
.templates-section{padding:0 var(--space-6) var(--space-4)}
.templates-toggle{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted);cursor:pointer;padding:var(--space-2) 0;width:100%}
.templates-toggle:hover{color:var(--color-text)}
.templates-toggle svg{transition:transform .2s}
.templates-toggle.open svg{transform:rotate(90deg)}
.templates-list{display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-3)}
.template-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3);display:flex;align-items:center;gap:var(--space-3)}
.template-info{flex:1;min-width:0}
.template-title{font-size:var(--text-sm);font-weight:500}
.template-meta{display:flex;gap:var(--space-2);margin-top:var(--space-1);flex-wrap:wrap}
.template-action-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--color-text-faint)}
.template-action-btn:hover{background:var(--color-surface-dynamic);color:var(--color-error)}

@media(max-width:680px){
  .matrix-grid{grid-template-columns:1fr;grid-template-rows:unset}
  .axis-x-row .axis-label:last-child{display:none}
  .matrix-wrapper{padding:var(--space-4)}
  .add-task-bar{padding:var(--space-3) var(--space-4)}
  .user-name{display:none}
}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">載入中…</div>

<div class="login-screen" id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="9" height="9" rx="1.5"/><rect x="13" y="2" width="9" height="9" rx="1.5"/>
        <rect x="2" y="13" width="9" height="9" rx="1.5"/><rect x="13" y="13" width="9" height="9" rx="1.5"/>
      </svg>
      艾森豪爾矩陣
    </div>
    <p class="login-desc">登入後，你的任務會儲存在雲端，<br>任何裝置都能同步使用。</p>
    <button class="btn-google" id="login-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<div class="app-screen" id="app-screen">
  <header class="app-header">
    <div class="app-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="9" height="9" rx="1.5"/><rect x="13" y="2" width="9" height="9" rx="1.5"/>
        <rect x="2" y="13" width="9" height="9" rx="1.5"/><rect x="13" y="13" width="9" height="9" rx="1.5"/>
      </svg>
      艾森豪爾矩陣
    </div>
    <div class="header-actions">
      <span id="sync-status" style="display:flex;align-items:center;font-size:10px;color:var(--color-text-faint)">
        <span class="sync-dot" id="sync-dot"></span><span id="sync-text">已同步</span>
      </span>
      <div class="user-info">
        <img class="user-avatar" id="user-avatar" src="" alt="頭像">
        <span class="user-name" id="user-name"></span>
      </div>
      <button class="btn-icon" data-theme-toggle aria-label="切換深色模式">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="btn-icon" id="logout-btn" title="登出" aria-label="登出">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <div class="add-task-bar">
    <input class="task-input" id="quick-input" type="text" placeholder="輸入新任務…按 Enter 快速開啟新增視窗">
    <button class="btn-primary" id="add-task-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      加入任務
    </button>
  </div>

  <div class="matrix-wrapper">
    <div class="matrix-with-axis">
      <div class="matrix-axis-y" aria-hidden="true">↑ 緊急</div>
      <div class="matrix-content">
        <div class="axis-x-row" aria-hidden="true">
          <span class="axis-label">重要</span>
          <span class="axis-label">不重要</span>
        </div>
        <div class="matrix-grid" id="matrix">
          <div class="quadrant q1" data-quadrant="q1" id="drop-q1">
            <div class="q-header"><span class="q-dot"></span><span class="q-title">立即執行</span><span class="q-subtitle">緊急 × 重要</span></div>
            <div class="q-cards" id="cards-q1"></div>
          </div>
          <div class="quadrant q2" data-quadrant="q2" id="drop-q2">
            <div class="q-header"><span class="q-dot"></span><span class="q-title">規劃執行</span><span class="q-subtitle">不緊急 × 重要</span></div>
            <div class="q-cards" id="cards-q2"></div>
          </div>
          <div class="quadrant q3" data-quadrant="q3" id="drop-q3">
            <div class="q-header"><span class="q-dot"></span><span class="q-title">委派他人</span><span class="q-subtitle">緊急 × 不重要</span></div>
            <div class="q-cards" id="cards-q3"></div>
          </div>
          <div class="quadrant q4" data-quadrant="q4" id="drop-q4">
            <div class="q-header"><span class="q-dot"></span><span class="q-title">刪除或延後</span><span class="q-subtitle">不緊急 × 不重要</span></div>
            <div class="q-cards" id="cards-q4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Repeat Templates -->
  <div class="templates-section" id="templates-section" style="display:none">
    <button class="templates-toggle" id="templates-toggle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      重複任務範本 <span id="templates-count" style="color:var(--color-text-faint);font-size:var(--text-xs)"></span>
    </button>
    <div class="templates-list" id="templates-list" style="display:none"></div>
  </div>

  <!-- Completed -->
  <div class="completed-section" id="completed-section" style="display:none">
    <button class="completed-toggle" id="completed-toggle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      已完成任務 <span id="completed-count" style="color:var(--color-text-faint);font-size:var(--text-xs)"></span>
    </button>
    <div class="completed-list" id="completed-list" style="display:none"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal" style="display:none" role="dialog" aria-modal="true">
  <div class="modal">
    <h2 class="modal-title">新增任務</h2>
    <div class="form-row">
      <label class="form-label" for="modal-title-input">任務名稱</label>
      <input class="form-input" id="modal-title-input" type="text" placeholder="輸入任務名稱…">
    </div>
    <div class="form-row">
      <label class="form-label" for="modal-note">備註（選填）</label>
      <textarea class="form-input" id="modal-note" placeholder="備註說明…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-label">放入象限</div>
      <div class="q-select-grid">
        <div class="q-option q1-opt" data-q="q1">🔴 立即執行<br><small>緊急 × 重要</small></div>
        <div class="q-option q2-opt" data-q="q2">🟢 規劃執行<br><small>不緊急 × 重要</small></div>
        <div class="q-option q3-opt" data-q="q3">🟠 委派他人<br><small>緊急 × 不重要</small></div>
        <div class="q-option q4-opt" data-q="q4">⚪ 刪除或延後<br><small>不緊急 × 不重要</small></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">重複頻率</div>
      <div class="repeat-select-row">
        <div class="repeat-opt selected" data-repeat="none">不重複</div>
        <div class="repeat-opt" data-repeat="daily">每日</div>
        <div class="repeat-opt" data-repeat="weekly">每週</div>
        <div class="repeat-opt" data-repeat="monthly">每月</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">取消</button>
      <button class="btn-primary" id="modal-confirm">加入</button>
    </div>
  </div>
</div>

<!-- Undo -->
<div class="undo-banner" id="undo-banner" style="display:none" role="status">
  <span id="undo-msg"></span>
  <button class="undo-btn" id="undo-action">復原</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, collection, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJiQ2hqQyJMDaNqUAcEqtWVPjo7poOKX4",
  authDomain: "eisenhower-matrix-cf088.firebaseapp.com",
  projectId: "eisenhower-matrix-cf088",
  storageBucket: "eisenhower-matrix-cf088.firebasestorage.app",
  messagingSenderId: "848359857651",
  appId: "1:848359857651:web:06396f366e4c1850940686"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

const LABELS = {q1:"立即執行",q2:"規劃執行",q3:"委派他人",q4:"刪除或延後"};
const REPEAT_LABELS = {none:"不重複",daily:"每日",weekly:"每週",monthly:"每月"};
let currentUser = null;
let tasks = [], completedTasks = [], templates = [];
let dragId = null, undoTimer = null;
let unsubTasks = null, unsubCompleted = null, unsubTemplates = null;

// ——— PERIOD KEY ———
function getPeriodKey(repeat) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  const week = Math.ceil(d/7);
  if (repeat === "daily")   return `${y}-${m}-${d}`;
  if (repeat === "weekly")  return `${y}-${m}-w${week}`;
  if (repeat === "monthly") return `${y}-${m}`;
  return null;
}

// ——— FIRESTORE REFS ———
const col = (uid, name) => collection(db, "users", uid, name);
const docRef = (uid, name, id) => doc(col(uid, name), String(id));

function setSyncing(v) {
  document.getElementById("sync-dot").classList.toggle("syncing", v);
  document.getElementById("sync-text").textContent = v ? "同步中…" : "已同步";
}
async function fsSet(uid, name, id, data) { setSyncing(true); await setDoc(docRef(uid,name,id), data); setSyncing(false); }
async function fsDel(uid, name, id) { setSyncing(true); await deleteDoc(docRef(uid,name,id)); setSyncing(false); }

// ——— LISTEN ———
function listenAll(uid) {
  if (unsubTasks) unsubTasks();
  if (unsubCompleted) unsubCompleted();
  if (unsubTemplates) unsubTemplates();
  unsubTasks = onSnapshot(query(col(uid,"tasks")), snap => {
    tasks = snap.docs.map(d => d.data()); renderMatrix();
  });
  unsubCompleted = onSnapshot(query(col(uid,"completed")), snap => {
    completedTasks = snap.docs.map(d => d.data()).sort((a,b)=>(b.completedAt||"").localeCompare(a.completedAt||"")); renderCompleted();
  });
  unsubTemplates = onSnapshot(query(col(uid,"templates")), snap => {
    templates = snap.docs.map(d => d.data()); renderTemplates(); checkRepeatTasks();
  });
}

// ——— CHECK REPEAT TASKS (runs on open) ———
async function checkRepeatTasks() {
  if (!currentUser || !templates.length) return;
  for (const tmpl of templates) {
    const key = getPeriodKey(tmpl.repeat);
    if (!key) continue;
    const alreadyExists = tasks.some(t => t.templateId === tmpl.id && t.periodKey === key);
    if (!alreadyExists) {
      const id = Date.now() + Math.random();
      await fsSet(currentUser.uid, "tasks", id, {
        id, title: tmpl.title, note: tmpl.note||"", quadrant: tmpl.quadrant,
        created: dateStr(), templateId: tmpl.id, periodKey: key, repeat: tmpl.repeat
      });
    }
  }
}

// ——— DATE ———
function dateStr() {
  const n = new Date();
  return (n.getMonth()+1)+"/"+(n.getDate())+" "+n.getHours()+":"+(n.getMinutes()+"").padStart(2,"0");
}

// ——— RENDER ———
function escHtml(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

function renderMatrix() {
  ["q1","q2","q3","q4"].forEach(q => {
    const el = document.getElementById("cards-"+q);
    const qt = tasks.filter(t => t.quadrant === q);
    if (!qt.length) { el.innerHTML = '<div class="q-empty">拖曳任務至此</div>'; return; }
    el.innerHTML = ""; qt.forEach(t => el.appendChild(createCard(t)));
  });
}

function createCard(task) {
  const div = document.createElement("div");
  div.className = "task-card"; div.draggable = true; div.dataset.id = task.id;
  const repeatBadge = task.repeat && task.repeat !== "none"
    ? `<span class="repeat-badge">↺ ${REPEAT_LABELS[task.repeat]}</span>` : "";
  div.innerHTML = `
    <button class="task-check" data-action="check" aria-label="完成">
      <svg viewBox="0 0 12 12"><polyline points="1.5 6 4.5 9 10.5 3"/></svg>
    </button>
    <div class="task-body">
      <div class="task-text">${escHtml(task.title)}</div>
      ${task.note ? `<div class="task-date">${escHtml(task.note)}</div>` : ""}
      <div class="task-meta">
        <span class="task-tag tag-${task.quadrant}">${LABELS[task.quadrant]}</span>
        ${repeatBadge}
        <span class="task-date">${task.created||""}</span>
      </div>
    </div>
    <div class="task-actions">
      <button class="task-action-btn delete" data-action="delete" aria-label="刪除">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  div.addEventListener("dragstart", onDragStart);
  div.addEventListener("dragend", onDragEnd);
  div.addEventListener("click", e => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;
    if (btn.dataset.action === "check") completeTask(task.id);
    if (btn.dataset.action === "delete") deleteTask(task.id);
  });
  return div;
}

function renderCompleted() {
  const section = document.getElementById("completed-section");
  const list = document.getElementById("completed-list");
  const count = document.getElementById("completed-count");
  if (!completedTasks.length) { section.style.display = "none"; return; }
  section.style.display = ""; count.textContent = "("+completedTasks.length+")";
  list.innerHTML = ""; completedTasks.forEach(t => list.appendChild(createCompletedCard(t)));
}

function createCompletedCard(task) {
  const div = document.createElement("div");
  div.className = "task-card completed"; div.style.opacity = ".55";
  div.innerHTML = `
    <button class="task-check checked" data-action="uncheck" aria-label="取消完成">
      <svg viewBox="0 0 12 12"><polyline points="1.5 6 4.5 9 10.5 3"/></svg>
    </button>
    <div class="task-body">
      <div class="task-text">${escHtml(task.title)}</div>
      <div class="task-meta">
        <span class="task-tag tag-${task.quadrant}">${LABELS[task.quadrant]}</span>
        <span class="task-date">完成於 ${task.completedAt||""}</span>
      </div>
    </div>
    <div class="task-actions">
      <button class="task-action-btn delete" data-action="permdelete" aria-label="永久刪除">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  div.addEventListener("click", e => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;
    if (btn.dataset.action === "uncheck") restoreTask(task.id);
    if (btn.dataset.action === "permdelete") permDeleteTask(task.id);
  });
  return div;
}

function renderTemplates() {
  const section = document.getElementById("templates-section");
  const list = document.getElementById("templates-list");
  const count = document.getElementById("templates-count");
  if (!templates.length) { section.style.display = "none"; return; }
  section.style.display = ""; count.textContent = "("+templates.length+")";
  list.innerHTML = "";
  templates.forEach(tmpl => {
    const div = document.createElement("div");
    div.className = "template-card";
    div.innerHTML = `
      <div class="template-info">
        <div class="template-title">${escHtml(tmpl.title)}</div>
        <div class="template-meta">
          <span class="task-tag tag-${tmpl.quadrant}">${LABELS[tmpl.quadrant]}</span>
          <span class="repeat-badge">↺ ${REPEAT_LABELS[tmpl.repeat]}</span>
        </div>
      </div>
      <button class="template-action-btn" data-id="${tmpl.id}" title="刪除範本" aria-label="刪除範本">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    div.querySelector("button").addEventListener("click", () => deleteTemplate(tmpl.id));
    list.appendChild(div);
  });
}

// ——— ACTIONS ———
async function addTask(title, note, quadrant, repeat) {
  if (!title.trim() || !quadrant) return;
  const id = Date.now();
  // if repeat, save template
  if (repeat && repeat !== "none") {
    await fsSet(currentUser.uid, "templates", id, { id, title: title.trim(), note: note||"", quadrant, repeat });
    // also create first instance now
    const key = getPeriodKey(repeat);
    await fsSet(currentUser.uid, "tasks", id, { id, title: title.trim(), note: note||"", quadrant, created: dateStr(), templateId: id, periodKey: key, repeat });
  } else {
    await fsSet(currentUser.uid, "tasks", id, { id, title: title.trim(), note: note||"", quadrant, created: dateStr() });
  }
}

async function completeTask(id) {
  const task = tasks.find(t => t.id === id); if (!task) return;
  await fsDel(currentUser.uid, "tasks", id);
  await fsSet(currentUser.uid, "completed", id, { ...task, completedAt: dateStr() });
  showUndo("已完成："+task.title, async () => {
    await fsDel(currentUser.uid, "completed", id);
    await fsSet(currentUser.uid, "tasks", id, task);
  });
}

async function deleteTask(id) {
  const task = tasks.find(t => t.id === id); if (!task) return;
  await fsDel(currentUser.uid, "tasks", id);
  showUndo("已刪除："+task.title, async () => { await fsSet(currentUser.uid, "tasks", id, task); });
}

async function restoreTask(id) {
  const task = completedTasks.find(t => t.id === id); if (!task) return;
  const { completedAt, ...restored } = task;
  await fsDel(currentUser.uid, "completed", id);
  await fsSet(currentUser.uid, "tasks", id, restored);
}

async function permDeleteTask(id) { await fsDel(currentUser.uid, "completed", id); }
async function deleteTemplate(id) { await fsDel(currentUser.uid, "templates", id); }

// ——— DRAG ———
function onDragStart(e) { dragId = this.dataset.id; this.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; }
function onDragEnd() { this.classList.remove("dragging"); document.querySelectorAll(".quadrant").forEach(q=>q.classList.remove("drag-over")); dragId=null; }
document.querySelectorAll(".quadrant").forEach(q => {
  q.addEventListener("dragover", e => { e.preventDefault(); q.classList.add("drag-over"); });
  q.addEventListener("dragleave", () => q.classList.remove("drag-over"));
  q.addEventListener("drop", async e => {
    e.preventDefault(); q.classList.remove("drag-over");
    if (!dragId) return;
    const newQ = q.dataset.quadrant;
    const task = tasks.find(t => String(t.id) === String(dragId));
    if (task && task.quadrant !== newQ) await fsSet(currentUser.uid, "tasks", task.id, { ...task, quadrant: newQ });
  });
});

// ——— MODAL ———
let selectedQ = null, selectedRepeat = "none";
const modal = document.getElementById("modal");
const modalInput = document.getElementById("modal-title-input");
const modalNote = document.getElementById("modal-note");

function openModal(prefill) {
  modalInput.value = prefill||""; modalNote.value = "";
  selectedQ = null; selectedRepeat = "none";
  document.querySelectorAll(".q-option").forEach(o => o.classList.remove("selected"));
  document.querySelectorAll(".repeat-opt").forEach(o => { o.classList.toggle("selected", o.dataset.repeat === "none"); });
  modal.style.display = "flex";
  setTimeout(() => modalInput.focus(), 50);
}
function closeModal() { modal.style.display = "none"; }

document.querySelectorAll(".q-option").forEach(opt => {
  opt.addEventListener("click", () => {
    selectedQ = opt.dataset.q;
    document.querySelectorAll(".q-option").forEach(o => o.classList.remove("selected"));
    opt.classList.add("selected");
  });
});
document.querySelectorAll(".repeat-opt").forEach(opt => {
  opt.addEventListener("click", () => {
    selectedRepeat = opt.dataset.repeat;
    document.querySelectorAll(".repeat-opt").forEach(o => o.classList.toggle("selected", o.dataset.repeat === selectedRepeat));
  });
});

document.getElementById("add-task-btn").addEventListener("click", () => openModal(document.getElementById("quick-input").value));
document.getElementById("quick-input").addEventListener("keydown", e => { if (e.key === "Enter" && e.target.value.trim()) openModal(e.target.value); });
document.getElementById("modal-cancel").addEventListener("click", closeModal);
modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
document.getElementById("modal-confirm").addEventListener("click", async () => {
  const t = modalInput.value.trim();
  if (!t) { modalInput.focus(); return; }
  if (!selectedQ) { alert("請選擇象限"); return; }
  await addTask(t, modalNote.value, selectedQ, selectedRepeat);
  document.getElementById("quick-input").value = "";
  closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape" && modal.style.display !== "none") closeModal(); });

// ——— COMPLETED TOGGLE ———
document.getElementById("completed-toggle").addEventListener("click", () => {
  const list = document.getElementById("completed-list");
  const toggle = document.getElementById("completed-toggle");
  const open = list.style.display !== "none";
  list.style.display = open ? "none" : "";
  toggle.classList.toggle("open", !open);
});

// ——— TEMPLATES TOGGLE ———
document.getElementById("templates-toggle").addEventListener("click", () => {
  const list = document.getElementById("templates-list");
  const toggle = document.getElementById("templates-toggle");
  const open = list.style.display !== "none";
  list.style.display = open ? "none" : "";
  toggle.classList.toggle("open", !open);
});

// ——— UNDO ———
function showUndo(msg, fn) {
  if (undoTimer) clearTimeout(undoTimer);
  const banner = document.getElementById("undo-banner");
  document.getElementById("undo-msg").textContent = msg;
  banner.classList.remove("hiding"); banner.style.display = "flex";
  document.getElementById("undo-action").onclick = () => { fn(); banner.style.display = "none"; clearTimeout(undoTimer); };
  undoTimer = setTimeout(() => { banner.classList.add("hiding"); setTimeout(() => banner.style.display = "none", 230); }, 4000);
}

// ——— THEME ———
(function(){
  const t = document.querySelector("[data-theme-toggle]");
  const r = document.documentElement;
  let d = matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light";
  r.setAttribute("data-theme", d);
  const update = () => t.innerHTML = d === "dark"
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  update();
  t.addEventListener("click", () => { d = d === "dark" ? "light" : "dark"; r.setAttribute("data-theme", d); update(); });
})();

// ——— AUTH ———
document.getElementById("login-btn").addEventListener("click", async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { alert("登入失敗："+e.message); }
});
document.getElementById("logout-btn").addEventListener("click", async () => {
  if (unsubTasks) unsubTasks(); if (unsubCompleted) unsubCompleted(); if (unsubTemplates) unsubTemplates();
  await signOut(auth);
});
onAuthStateChanged(auth, user => {
  document.getElementById("loading-screen").style.display = "none";
  if (user) {
    currentUser = user;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "flex";
    document.getElementById("user-name").textContent = user.displayName || user.email;
    document.getElementById("user-avatar").src = user.photoURL || "";
    listenAll(user.uid);
  } else {
    currentUser = null;
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app-screen").style.display = "none";
    tasks = []; completedTasks = []; templates = [];
  }
});
</script>
</body>
</html>
