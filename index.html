<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>艾森豪爾矩陣</title>
<style>
  :root {
    --q1: #ff6b6b; --q2: #ffa94d; --q3: #74c0fc; --q4: #a9e34b;
    --bg: #1a1a2e; --surface: #16213e; --card: #0f3460;
    --text: #e0e0e0; --subtext: #a0a0b0; --border: #2a2a4a;
    --radius: 10px; --shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ─── AUTH ─── */
  #auth-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 20px;
  }
  #auth-screen h1 { font-size: 2rem; }
  #auth-screen p { color: var(--subtext); }
  #google-btn {
    display: flex; align-items: center; gap: 10px;
    background: #fff; color: #333; border: none; padding: 12px 24px;
    border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600;
    box-shadow: var(--shadow); transition: transform .15s;
  }
  #google-btn:hover { transform: scale(1.03); }
  #google-btn img { width: 22px; }

  /* ─── HEADER ─── */
  #app { display: none; flex-direction: column; height: 100vh; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  header h1 { font-size: 1.3rem; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #user-info { display: flex; align-items: center; gap: 8px; font-size: .9rem; color: var(--subtext); }
  #user-info img { width: 30px; border-radius: 50%; }
  #sign-out-btn, #add-task-btn, #show-completed-btn {
    border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: .9rem; font-weight: 600;
  }
  #sign-out-btn { background: var(--border); color: var(--text); }
  #add-task-btn { background: #4dabf7; color: #000; }
  #show-completed-btn { background: var(--border); color: var(--text); }

  /* ─── MATRIX ─── */
  .matrix-wrapper { flex: 1; overflow: auto; padding: 16px; }
  .matrix {
    display: grid; grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr; gap: 12px;
    min-height: calc(100vh - 90px);
  }
  .quadrant {
    background: var(--surface); border-radius: var(--radius);
    border: 2px solid var(--border); padding: 14px;
    display: flex; flex-direction: column;
    min-height: 280px; transition: border-color .2s;
  }
  .quadrant.drag-over { border-color: #4dabf7; background: #0d2a4a; }
  .q1 { border-top: 4px solid var(--q1); }
  .q2 { border-top: 4px solid var(--q2); }
  .q3 { border-top: 4px solid var(--q3); }
  .q4 { border-top: 4px solid var(--q4); }
  .quadrant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .quadrant-title { font-size: .85rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
  .q1 .quadrant-title { color: var(--q1); }
  .q2 .quadrant-title { color: var(--q2); }
  .q3 .quadrant-title { color: var(--q3); }
  .q4 .quadrant-title { color: var(--q4); }
  .quadrant-subtitle { font-size: .75rem; color: var(--subtext); margin-bottom: 10px; }
  .task-list { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }

  /* ─── TASK CARD ─── */
  .task-card {
    background: var(--card); border-radius: 8px; padding: 10px 12px;
    cursor: grab; display: flex; align-items: flex-start; gap: 10px;
    border: 1px solid var(--border); transition: box-shadow .2s, opacity .2s;
    user-select: none;
  }
  .task-card:active { cursor: grabbing; }
  .task-card.dragging { opacity: .4; }
  .task-card.done { opacity: .5; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--subtext); }
  .task-check {
    width: 18px; height: 18px; border: 2px solid var(--subtext);
    border-radius: 50%; cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
  }
  .task-check.checked { background: #51cf66; border-color: #51cf66; }
  .task-check.checked::after { content: '✓'; font-size: 11px; color: #000; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: .9rem; word-break: break-word; }
  .task-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .badge {
    font-size: .68rem; padding: 2px 7px; border-radius: 20px;
    background: rgba(255,255,255,.1); color: var(--subtext);
  }
  .badge.repeat { background: rgba(77,171,247,.15); color: #74c0fc; }
  .task-edit-btn {
    background: none; border: none; color: var(--subtext); cursor: pointer;
    font-size: .85rem; padding: 2px 4px; flex-shrink: 0;
    border-radius: 4px; transition: color .15s;
  }
  .task-edit-btn:hover { color: var(--text); }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    padding: 28px; width: 90%; max-width: 480px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: .85rem; color: var(--subtext); margin-bottom: 5px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 9px 12px; font-size: .9rem;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: 2px solid #4dabf7; border-color: transparent;
  }
  .form-group textarea { resize: vertical; min-height: 70px; }
  #repeat-options { display: none; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-cancel { background: var(--border); color: var(--text); border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; }
  .btn-save { background: #4dabf7; color: #000; border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-weight: 700; }
  .btn-delete { background: #ff6b6b; color: #fff; border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; }

  /* ─── COMPLETED PANEL ─── */
  #completed-panel {
    display: none; position: fixed; right: 0; top: 0; bottom: 0;
    width: 340px; background: var(--surface); border-left: 1px solid var(--border);
    z-index: 900; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,.5);
  }
  #completed-panel.open { display: flex; }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .panel-header h3 { font-size: 1rem; }
  #close-panel { background: none; border: none; color: var(--subtext); font-size: 1.3rem; cursor: pointer; }
  #completed-list { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .completed-item {
    background: var(--card); border-radius: 8px; padding: 10px 12px;
    opacity: .7; border: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  }
  .completed-item .ci-body { flex: 1; min-width: 0; }
  .completed-item .ci-title { font-size: .88rem; text-decoration: line-through; color: var(--subtext); }
  .completed-item .ci-meta { font-size: .72rem; color: var(--subtext); margin-top: 4px; }
  .restore-btn {
    background: none; border: 1px solid var(--subtext); color: var(--subtext);
    border-radius: 6px; padding: 3px 9px; font-size: .75rem; cursor: pointer;
    flex-shrink: 0;
  }
  .restore-btn:hover { color: var(--text); border-color: var(--text); }

  /* ─── TOAST ─── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: .88rem; transition: transform .3s; z-index: 2000; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) {
    .matrix { grid-template-columns: 1fr; grid-template-rows: auto; }
    #completed-panel { width: 100%; }
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <h1>🎯 艾森豪爾矩陣</h1>
  <p>使用 Google 帳號登入以同步你的任務</p>
  <button id="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
    使用 Google 登入
  </button>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>🎯 艾森豪爾矩陣</h1>
    <div class="header-right">
      <button id="show-completed-btn">✅ 已完成</button>
      <button id="add-task-btn">＋ 新增任務</button>
      <div id="user-info">
        <img id="user-avatar" src="" alt="" />
        <span id="user-name"></span>
      </div>
      <button id="sign-out-btn">登出</button>
    </div>
  </header>

  <div class="matrix-wrapper">
    <div class="matrix">
      <div class="quadrant q1" data-q="q1">
        <div class="quadrant-header">
          <span class="quadrant-title">第一象限</span>
        </div>
        <div class="quadrant-subtitle">緊急 &amp; 重要 — 立即處理</div>
        <div class="task-list" id="list-q1"></div>
      </div>
      <div class="quadrant q2" data-q="q2">
        <div class="quadrant-header">
          <span class="quadrant-title">第二象限</span>
        </div>
        <div class="quadrant-subtitle">不緊急 &amp; 重要 — 計劃執行</div>
        <div class="task-list" id="list-q2"></div>
      </div>
      <div class="quadrant q3" data-q="q3">
        <div class="quadrant-header">
          <span class="quadrant-title">第三象限</span>
        </div>
        <div class="quadrant-subtitle">緊急 &amp; 不重要 — 委派他人</div>
        <div class="task-list" id="list-q3"></div>
      </div>
      <div class="quadrant q4" data-q="q4">
        <div class="quadrant-header">
          <span class="quadrant-title">第四象限</span>
        </div>
        <div class="quadrant-subtitle">不緊急 &amp; 不重要 — 考慮刪除</div>
        <div class="task-list" id="list-q4"></div>
      </div>
    </div>
  </div>
</div>

<!-- COMPLETED PANEL -->
<div id="completed-panel">
  <div class="panel-header">
    <h3>✅ 已完成任務</h3>
    <button id="close-panel">✕</button>
  </div>
  <div id="completed-list"></div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h2 id="modal-title">新增任務</h2>
    <div class="form-group">
      <label>任務名稱 *</label>
      <input type="text" id="f-title" placeholder="輸入任務名稱..." />
    </div>
    <div class="form-group">
      <label>備註</label>
      <textarea id="f-note" placeholder="選填備註..."></textarea>
    </div>
    <div class="form-group">
      <label>象限</label>
      <select id="f-quadrant">
        <option value="q1">Q1 — 緊急 &amp; 重要</option>
        <option value="q2">Q2 — 不緊急 &amp; 重要</option>
        <option value="q3">Q3 — 緊急 &amp; 不重要</option>
        <option value="q4">Q4 — 不緊急 &amp; 不重要</option>
      </select>
    </div>
    <div class="form-group">
      <label>截止日期</label>
      <input type="date" id="f-due" />
    </div>
    <div class="form-group">
      <label>重複</label>
      <select id="f-repeat">
        <option value="none">不重複</option>
        <option value="daily">每日</option>
        <option value="weekly">每週</option>
        <option value="monthly">每月</option>
      </select>
    </div>
    <div id="repeat-options">
      <div class="form-group">
        <label>重複起始日期</label>
        <input type="date" id="f-repeat-start" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="modal-delete-btn" style="display:none">刪除</button>
      <button class="btn-cancel" id="modal-cancel-btn">取消</button>
      <button class="btn-save" id="modal-save-btn">儲存</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  query, where, onSnapshot, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ─── Firebase Init ───────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDJiQ2hqQyJMDaNqUAcEqtWVPjo7poOKX4",
  authDomain: "eisenhower-matrix-cf088.firebaseapp.com",
  projectId: "eisenhower-matrix-cf088",
  storageBucket: "eisenhower-matrix-cf088.firebasestorage.app",
  messagingSenderId: "848359857651",
  appId: "1:848359857651:web:06396f366e4c1850940686"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── State ───────────────────────────────────────────────────
let currentUser = null;
let tasks = [];
let unsubscribe = null;
let dragSrcId = null;
let editingTaskId = null;

// ─── Auth UI ─────────────────────────────────────────────────
const authScreen = document.getElementById('auth-screen');
const appEl = document.getElementById('app');
const userAvatar = document.getElementById('user-avatar');
const userName = document.getElementById('user-name');

document.getElementById('google-btn').addEventListener('click', () => {
  signInWithPopup(auth, new GoogleAuthProvider()).catch(e => showToast('登入失敗：' + e.message));
});
document.getElementById('sign-out-btn').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    authScreen.style.display = 'none';
    appEl.style.display = 'flex';
    userAvatar.src = user.photoURL || '';
    userName.textContent = user.displayName || user.email;
    subscribeToTasks();
    scheduleRepeatCheck();
  } else {
    authScreen.style.display = 'flex';
    appEl.style.display = 'none';
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    tasks = [];
    renderAll();
  }
});

// ─── Firestore Subscription ──────────────────────────────────
function subscribeToTasks() {
  if (unsubscribe) unsubscribe();
  const q = query(collection(db, 'tasks'), where('uid', '==', currentUser.uid));
  unsubscribe = onSnapshot(q, snap => {
    tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  });
}

// ─── Render ──────────────────────────────────────────────────
const qLabels = { q1: 'Q1', q2: 'Q2', q3: 'Q3', q4: 'Q4' };
const repeatLabels = { daily: '每日', weekly: '每週', monthly: '每月' };

function renderAll() {
  ['q1','q2','q3','q4'].forEach(q => {
    const el = document.getElementById('list-' + q);
    const active = tasks.filter(t => t.quadrant === q && !t.done);
    el.innerHTML = '';
    active.forEach(t => el.appendChild(createCard(t)));
  });
  renderCompleted();
}

function createCard(t) {
  const div = document.createElement('div');
  div.className = 'task-card' + (t.done ? ' done' : '');
  div.setAttribute('draggable', 'true');
  div.dataset.id = t.id;

  const check = document.createElement('div');
  check.className = 'task-check' + (t.done ? ' checked' : '');
  check.addEventListener('click', e => { e.stopPropagation(); toggleDone(t); });

  const body = document.createElement('div');
  body.className = 'task-body';

  const title = document.createElement('div');
  title.className = 'task-title';
  title.textContent = t.title;

  const meta = document.createElement('div');
  meta.className = 'task-meta';
  if (t.due) {
    const b = document.createElement('span');
    b.className = 'badge';
    b.textContent = '📅 ' + t.due;
    meta.appendChild(b);
  }
  if (t.repeat && t.repeat !== 'none') {
    const b = document.createElement('span');
    b.className = 'badge repeat';
    b.textContent = '🔁 ' + repeatLabels[t.repeat];
    meta.appendChild(b);
  }
  if (t.note) {
    const b = document.createElement('span');
    b.className = 'badge';
    b.textContent = '📝';
    meta.appendChild(b);
  }
  body.appendChild(title);
  body.appendChild(meta);

  const editBtn = document.createElement('button');
  editBtn.className = 'task-edit-btn';
  editBtn.textContent = '✏️';
  editBtn.title = '編輯';
  editBtn.addEventListener('click', e => { e.stopPropagation(); openEditModal(t); });

  div.appendChild(check);
  div.appendChild(body);
  div.appendChild(editBtn);

  // Click card to edit
  div.addEventListener('click', () => openEditModal(t));

  // Drag events
  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend', onDragEnd);

  return div;
}

function renderCompleted() {
  const el = document.getElementById('completed-list');
  const done = tasks.filter(t => t.done).sort((a,b) => (b.completedAt||0) - (a.completedAt||0));
  el.innerHTML = '';
  if (!done.length) {
    el.innerHTML = '<p style="color:var(--subtext);font-size:.85rem;text-align:center;padding:20px">尚無已完成任務</p>';
    return;
  }
  done.forEach(t => {
    const item = document.createElement('div');
    item.className = 'completed-item';
    const dateStr = t.completedAt ? new Date(t.completedAt).toLocaleDateString('zh-TW') : '';
    item.innerHTML = `
      <div class="ci-body">
        <div class="ci-title">${escHtml(t.title)}</div>
        <div class="ci-meta">${qLabels[t.quadrant] || ''} ${dateStr ? '· 完成於 ' + dateStr : ''}</div>
      </div>
      <button class="restore-btn" data-id="${t.id}">還原</button>
    `;
    item.querySelector('.restore-btn').addEventListener('click', () => restoreTask(t.id));
    el.appendChild(item);
  });
}

// ─── Drag & Drop ─────────────────────────────────────────────
document.querySelectorAll('.quadrant').forEach(q => {
  q.addEventListener('dragover', e => { e.preventDefault(); q.classList.add('drag-over'); });
  q.addEventListener('dragleave', () => q.classList.remove('drag-over'));
  q.addEventListener('drop', onDrop);
});

function onDragStart(e) {
  dragSrcId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); }

async function onDrop(e) {
  e.preventDefault();
  const quadrant = e.currentTarget.dataset.q;
  document.querySelectorAll('.quadrant').forEach(q => q.classList.remove('drag-over'));
  if (!dragSrcId || !quadrant) return;
  await updateDoc(doc(db, 'tasks', dragSrcId), { quadrant });
  showToast('任務已移動至 ' + qLabels[quadrant]);
  dragSrcId = null;
}

// ─── Toggle Done ─────────────────────────────────────────────
async function toggleDone(t) {
  if (!t.done) {
    await updateDoc(doc(db, 'tasks', t.id), { done: true, completedAt: Date.now() });
    // Handle repeat: create next occurrence
    if (t.repeat && t.repeat !== 'none') {
      const nextDue = calcNextRepeat(t);
      if (nextDue) {
        await addDoc(collection(db, 'tasks'), {
          uid: currentUser.uid, title: t.title, note: t.note || '',
          quadrant: t.quadrant, due: nextDue,
          repeat: t.repeat, repeatStart: t.repeatStart || '',
          done: false, completedAt: null,
          createdAt: serverTimestamp()
        });
      }
    }
    showToast('✅ 任務完成！');
  } else {
    await updateDoc(doc(db, 'tasks', t.id), { done: false, completedAt: null });
  }
}

function calcNextRepeat(t) {
  const base = t.due ? new Date(t.due) : new Date();
  if (isNaN(base)) return null;
  if (t.repeat === 'daily') base.setDate(base.getDate() + 1);
  else if (t.repeat === 'weekly') base.setDate(base.getDate() + 7);
  else if (t.repeat === 'monthly') base.setMonth(base.getMonth() + 1);
  return base.toISOString().split('T')[0];
}

function scheduleRepeatCheck() {
  // On load: ensure today's repeating tasks exist (by due date)
  // Light check — avoids duplicates by not auto-generating unless user marks done
}

async function restoreTask(id) {
  await updateDoc(doc(db, 'tasks', id), { done: false, completedAt: null });
  showToast('任務已還原');
}

// ─── Modal ───────────────────────────────────────────────────
const modal = document.getElementById('task-modal');
const fTitle = document.getElementById('f-title');
const fNote = document.getElementById('f-note');
const fQuadrant = document.getElementById('f-quadrant');
const fDue = document.getElementById('f-due');
const fRepeat = document.getElementById('f-repeat');
const fRepeatStart = document.getElementById('f-repeat-start');
const repeatOptions = document.getElementById('repeat-options');
const deleteBtn = document.getElementById('modal-delete-btn');

document.getElementById('add-task-btn').addEventListener('click', () => openAddModal());
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('modal-save-btn').addEventListener('click', saveTask);
deleteBtn.addEventListener('click', deleteTask);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

fRepeat.addEventListener('change', () => {
  repeatOptions.style.display = fRepeat.value !== 'none' ? 'block' : 'none';
});

function openAddModal(quadrant = 'q1') {
  editingTaskId = null;
  document.getElementById('modal-title').textContent = '新增任務';
  fTitle.value = ''; fNote.value = '';
  fQuadrant.value = quadrant;
  fDue.value = ''; fRepeat.value = 'none';
  fRepeatStart.value = '';
  repeatOptions.style.display = 'none';
  deleteBtn.style.display = 'none';
  modal.classList.add('open');
  fTitle.focus();
}

function openEditModal(t) {
  editingTaskId = t.id;
  document.getElementById('modal-title').textContent = '編輯任務';
  fTitle.value = t.title || '';
  fNote.value = t.note || '';
  fQuadrant.value = t.quadrant || 'q1';
  fDue.value = t.due || '';
  fRepeat.value = t.repeat || 'none';
  fRepeatStart.value = t.repeatStart || '';
  repeatOptions.style.display = (t.repeat && t.repeat !== 'none') ? 'block' : 'none';
  deleteBtn.style.display = 'inline-block';
  modal.classList.add('open');
  fTitle.focus();
}

function closeModal() { modal.classList.remove('open'); editingTaskId = null; }

async function saveTask() {
  const title = fTitle.value.trim();
  if (!title) { fTitle.focus(); showToast('請輸入任務名稱'); return; }
  const data = {
    uid: currentUser.uid,
    title,
    note: fNote.value.trim(),
    quadrant: fQuadrant.value,
    due: fDue.value,
    repeat: fRepeat.value,
    repeatStart: fRepeat.value !== 'none' ? fRepeatStart.value : '',
    done: false
  };
  if (editingTaskId) {
    await updateDoc(doc(db, 'tasks', editingTaskId), data);
    showToast('任務已更新');
  } else {
    data.createdAt = serverTimestamp();
    data.completedAt = null;
    await addDoc(collection(db, 'tasks'), data);
    showToast('任務已新增');
  }
  closeModal();
}

async function deleteTask() {
  if (!editingTaskId) return;
  if (!confirm('確定要刪除這個任務？')) return;
  await deleteDoc(doc(db, 'tasks', editingTaskId));
  showToast('任務已刪除');
  closeModal();
}

// ─── Completed Panel ─────────────────────────────────────────
const completedPanel = document.getElementById('completed-panel');
document.getElementById('show-completed-btn').addEventListener('click', () => {
  completedPanel.classList.toggle('open');
});
document.getElementById('close-panel').addEventListener('click', () => {
  completedPanel.classList.remove('open');
});

// ─── Toast ───────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ─── Utils ───────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
